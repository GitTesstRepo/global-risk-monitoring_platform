id: ge_gcp_kv
namespace: gdelt_events

tasks:
  - id: gcp_project_id
    type: io.kestra.plugin.core.kv.Set
    key: GCP_PROJECT_ID
    kvType: STRING
    value: your-project-name # TODO replace with your project id

  - id: gcp_location
    type: io.kestra.plugin.core.kv.Set
    key: GCP_LOCATION
    kvType: STRING
    value: europe-central2

  - id: gcp_bucket_name
    type: io.kestra.plugin.core.kv.Set
    key: GCP_BUCKET_NAME
    kvType: STRING
    value: your_bucket_name # TODO make sure it's globally unique!

  - id: gcp_dataset
    type: io.kestra.plugin.core.kv.Set
    key: GCP_DATASET
    kvType: STRING
    value: your-dataset-name # TODO Replace with your dataset name
  
  - id: gcp_external_table
    type: io.kestra.plugin.core.kv.Set
    key: GCP_TABLE_EXTERNAL
    kvType: STRING
    value: your-ext-table-name # TODO Replace with your external table name

  - id: gcp_partitioned_table
    type: io.kestra.plugin.core.kv.Set
    key: GCP_TABLE_PARTITIONED
    kvType: STRING
    value: your-partitioned-table-name # TODO Replace with your partitioned table name
